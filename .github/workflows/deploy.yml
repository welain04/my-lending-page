name: Deploy to SpaceWeb

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assemble deploy payload (PHP + .htaccess + config)
        run: |
          mkdir -p dist/api
          cp php/lead.php dist/api/lead.php
          cp php/.htaccess dist/.htaccess
          # Подставляем реальные значения секретов прямо в config.php,
          # чтобы не зависеть от переменных окружения на хостинге.
          python3 - <<'PY'
          import os
          path = "dist/api/config.php"
          # URL веб-приложения Apps Script не является секретом (защита — по токену),
          # поэтому фиксируем его здесь, чтобы гарантированно указывал на актуальный деплой.
          config = {
              "GOOGLE_SHEET_WEBHOOK_URL": "https://script.google.com/macros/s/AKfycbx8wAGP23v0Zw7M99M9QDFnGWAk6JUB2MNyfON2KCcjkjeqhW4rPwPR3DmuBu8sM8s2-w/exec",
              "GOOGLE_SHEET_TOKEN": os.environ.get("GOOGLE_SHEET_TOKEN", ""),
          }
          lines = ["<?php", "return ["]
          for key, value in config.items():
              safe = value.replace("\\", "\\\\").replace("'", "\\'")
              lines.append(f"    '{key}' => '{safe}',")
          lines.append("];")
          with open(path, "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY
        env:
          GOOGLE_SHEET_TOKEN: ${{ secrets.GOOGLE_SHEET_TOKEN }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Путь относительно домашней папки FTP-логина (не /home/w/... целиком)
          server-dir: digital-nest_ru/public_html/
          protocol: ftp
          log-level: verbose
